name: Enhanced Content Processing Workflow
# 拡張SNSコンテンツ処理システム - 独立ワークフロー

permissions:
  contents: read
  issues: write
  pull-requests: read

on:
  # 手動実行
  workflow_dispatch:
    inputs:
      quality_threshold:
        description: '品質スコア閾値 (0-100)'
        required: false
        default: '60.0'
        type: string
      similarity_threshold:
        description: '類似度判定閾値 (0-1.0)'
        required: false
        default: '0.7'
        type: string
      disable_fact_check:
        description: 'ファクトチェックを無効化'
        required: false
        default: false
        type: boolean
      test_mode:
        description: 'テストモード（サンプルデータ使用）'
        required: false
        default: true
        type: boolean
      log_level:
        description: 'ログレベル'
        required: false
        default: 'INFO'
        type: choice
        options:
        - DEBUG
        - INFO
        - WARNING
        - ERROR
  
  # スケジュール実行（毎日7:30 JST - メインワークフロー後30分）
  schedule:
    - cron: '30 22 * * *'   # 毎日 7:30 JST (UTC 22:30)

  # プッシュトリガー（feature/enhanced-content ブランチ）
  push:
    branches:
      - 'feature/enhanced-content'
      - 'feature/sns-content-improvement'
    paths:
      - 'src/market_data/**'
      - 'src/content/**'
      - 'src/quality/**'
      - 'enhanced_content_main.py'
      - 'enhanced_content_config.py'
      - '.github/workflows/enhanced-content-processing.yml'

env:
  PYTHONPATH: ${{ github.workspace }}
  TZ: Asia/Tokyo

jobs:
  enhanced-content-processing:
    name: Enhanced Content Processing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        python-version: ["3.12"]
        
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Download Latest Articles Artifact
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: main.yml
        name: 'market-news-db'
        path: artifacts/
        if_no_artifact_found: warn
      continue-on-error: true

    - name: Extract Articles Data
      run: |
        echo "Extracting articles data from artifacts..."
        if [ -d "artifacts" ] && [ "$(ls -A artifacts)" ]; then
          echo "Found artifacts directory with contents"
          find artifacts -type f | head -10
          
          if [ -f "artifacts/market_news.db" ]; then
            echo "Found database file: artifacts/market_news.db"
            mkdir -p data/
            echo "Checking database schema..."
            sqlite3 artifacts/market_news.db ".schema articles"
            echo "Extracting articles from database..."
            echo "Checking article date ranges..."
            sqlite3 artifacts/market_news.db "SELECT 'Oldest:' as type, MIN(published_at) as date FROM articles WHERE published_at IS NOT NULL UNION SELECT 'Newest:' as type, MAX(published_at) as date FROM articles WHERE published_at IS NOT NULL UNION SELECT 'Count:' as type, COUNT(*) as date FROM articles WHERE published_at IS NOT NULL;"
            
            echo "Recent articles (last 24 hours check):"
            sqlite3 artifacts/market_news.db "SELECT COUNT(*) as count_24h FROM articles WHERE published_at >= datetime('now', '-24 hours') AND published_at IS NOT NULL;"
            
            echo "Extracting articles for processing..."
            sqlite3 -header -json artifacts/market_news.db "SELECT title, url, body as summary, published_at as published_jst, 'neutral' as sentiment_label FROM articles WHERE published_at IS NOT NULL ORDER BY scraped_at DESC LIMIT 50;" > data/articles.json
            if [ -f "data/articles.json" ] && [ -s "data/articles.json" ]; then
              echo "✅ Articles data extracted from database successfully"  
              echo "Articles count: $(jq length data/articles.json 2>/dev/null || echo 'JSON parse error')"
            else
              echo "❌ Failed to extract articles from database"
            fi
          else
            echo "⚠️ No database file found in artifacts"
            echo "Available files:"
            find artifacts -type f | head -10
          fi
        else
          echo "⚠️ No artifacts found, will use test mode"
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libssl-dev libffi-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 拡張コンテンツ処理に必要な追加パッケージ
        pip install yfinance>=0.2.18 requests>=2.28.0
        # JSON処理用
        sudo apt-get install -y jq

    - name: Validate Configuration
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python -c "
        from enhanced_content_config import validate_config, CONFIG
        errors = validate_config()
        if errors:
            print('Configuration validation errors:')
            for error in errors:
                print(f'  - {error}')
            exit(1)
        else:
            print('Configuration validation passed')
            print(f'Quality threshold: {CONFIG.MIN_QUALITY_SCORE}')
            print(f'Similarity threshold: {CONFIG.SIMILARITY_THRESHOLD}')
        "

    - name: Test Market Data Integration
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "Basic functionality verification..."
        
        # 類似度チェッカーのテスト（最小限）
        python -c "
        try:
            from src.quality.similarity_checker import SimilarityChecker
            checker = SimilarityChecker()
            print('✅ Core functionality available')
        except Exception as e:
            print(f'⚠️  Some components unavailable: {e}')
            print('✅ Will continue with available features')
        "

    - name: Run Enhanced Content Processing
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # パラメータ設定
        QUALITY_THRESHOLD="${{ github.event.inputs.quality_threshold || '70.0' }}"
        SIMILARITY_THRESHOLD="${{ github.event.inputs.similarity_threshold || '0.7' }}"
        DISABLE_FACT_CHECK="${{ github.event.inputs.disable_fact_check || 'false' }}"
        TEST_MODE="${{ github.event.inputs.test_mode || 'false' }}"
        LOG_LEVEL="${{ github.event.inputs.log_level || 'INFO' }}"
        
        # コマンド構築
        CMD="python enhanced_content_main.py"
        CMD="$CMD --quality-threshold $QUALITY_THRESHOLD"
        CMD="$CMD --similarity-threshold $SIMILARITY_THRESHOLD"
        CMD="$CMD --log-level $LOG_LEVEL"
        CMD="$CMD --output-file results/enhanced_content_results.json"
        
        # 実記事データを使用（テストモードでない場合）
        if [ "$TEST_MODE" = "false" ]; then
          if [ -f "data/articles.json" ]; then
            CMD="$CMD --input-file data/articles.json"
            echo "✅ Using extracted articles data"
          else
            echo "⚠️ No articles.json found, using test mode"
            CMD="$CMD --test-mode"
          fi
        fi
        
        if [ "$DISABLE_FACT_CHECK" = "true" ]; then
          CMD="$CMD --disable-fact-check"
        fi
        
        if [ "$TEST_MODE" = "true" ]; then
          CMD="$CMD --test-mode"
        fi
        
        # 結果ディレクトリ作成
        mkdir -p results
        
        # 処理実行
        echo "Executing: $CMD"
        eval $CMD || {
          echo "⚠️  Main processing encountered issues, but continuing..."
          echo "Check logs for details"
        }

    - name: Generate Processing Report
      if: always()
      run: |
        mkdir -p results
        echo "# Enhanced Content Processing Report" > results/processing_report.md
        echo "" >> results/processing_report.md
        echo "**実行時刻:** $(date '+%Y-%m-%d %H:%M:%S %Z')" >> results/processing_report.md
        echo "**ワークフロー:** ${{ github.workflow }}" >> results/processing_report.md
        echo "**実行者:** ${{ github.actor }}" >> results/processing_report.md
        echo "**コミット:** ${{ github.sha }}" >> results/processing_report.md
        echo "" >> results/processing_report.md
        
        # パラメータ情報
        echo "## 実行パラメータ" >> results/processing_report.md
        echo "- 品質閾値: ${{ github.event.inputs.quality_threshold || '70.0' }}" >> results/processing_report.md
        echo "- 類似度閾値: ${{ github.event.inputs.similarity_threshold || '0.7' }}" >> results/processing_report.md
        echo "- ファクトチェック: ${{ github.event.inputs.disable_fact_check == 'true' && '無効' || '有効' }}" >> results/processing_report.md
        echo "- テストモード: ${{ github.event.inputs.test_mode || 'false' }}" >> results/processing_report.md
        echo "- ログレベル: ${{ github.event.inputs.log_level || 'INFO' }}" >> results/processing_report.md
        echo "- データソース: $([ -f 'data/articles.json' ] && echo 'アーティファクト記事データ' || echo 'サンプルデータ')" >> results/processing_report.md
        echo "" >> results/processing_report.md
        
        # 処理結果サマリー
        echo "## 処理結果サマリー" >> results/processing_report.md
        python3 generate_report.py results/enhanced_content_results.json >> results/processing_report.md

    - name: Upload Processing Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: enhanced-content-results-${{ github.run_number }}
        path: |
          results/
          *.log
        retention-days: 30
        compression-level: 6
        overwrite: true

    - name: Post Results to Issues (on failure)
      if: failure() && github.event_name != 'schedule'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          let body = `## 🚨 Enhanced Content Processing Failed
          
          **実行時刻:** ${new Date().toLocaleString('ja-JP', {timeZone: 'Asia/Tokyo'})}
          **ワークフロー実行:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **コミット:** ${{ github.sha }}
          
          処理が失敗しました。ログを確認してください。
          `;
          
          try {
            if (fs.existsSync('results/processing_report.md')) {
              const report = fs.readFileSync('results/processing_report.md', 'utf8');
              body += '\n\n' + report;
            }
          } catch (error) {
            body += '\n\n⚠️ 詳細レポートの取得に失敗しました。';
          }
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Enhanced Content Processing Failed - Run #${{ github.run_number }}`,
            body: body,
            labels: ['bug', 'enhanced-content', 'workflow-failure']
          });

    - name: Success Notification
      if: success() && github.event_name == 'schedule'
      run: |
        echo "✅ Enhanced Content Processing completed successfully"
        echo "Scheduled run completed at $(date)"
        
        # 成功時の簡潔な通知（必要に応じてSlack/Discord等に送信可能）
        if [ -f "results/enhanced_content_results.json" ]; then
          python -c "
          import json
          with open('results/enhanced_content_results.json', 'r', encoding='utf-8') as f:
              results = json.load(f)
          print(f'📊 処理完了: {results.get(\"input_article_count\", 0)}記事 → {len(results.get(\"enhanced_articles\", []))}拡張記事')
          "
        fi