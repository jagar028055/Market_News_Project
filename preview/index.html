<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNSプレビュー - Market News Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; margin: 2rem; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        .message { background: #f0f8ff; border: 1px solid #0066cc; border-radius: 8px; padding: 2rem; margin: 2rem 0; }
        .nav { background: #f5f5f5; padding: 1rem; border-radius: 8px; margin-bottom: 2rem; }
        .nav a { color: #0066cc; text-decoration: none; font-weight: bold; }

<body>
    <div class="container">
        <div class="nav">
            <a href="../">← メインニュースページに戻る</a>
        </div>
        
        <h1>🎨 SNSプレビュー</h1>
        
        <div class="message">
            <h2>📋 プレビュー待機中</h2>
            <p>SNSコンテンツはまだ生成されていません。</p>
            <p>SNSコンテンツを生成するには、以下の方法があります：</p>
            <ul style="text-align: left; display: inline-block;">
                <li>Social Content Previewワークフローを手動実行</li>
                <li>social-content-preview.ymlトリガー条件に該当するファイルを更新</li>
            </ul>
            <p><strong>💡 生成後、このページに画像やnote記事が表示されます</strong></p>
        </div>
        
        <div style="margin-top: 2rem; color: #666; font-size: 0.9em;">

        </div>
