<!DOCTYPE html>
<html lang="ja" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self'; font-src 'self' https://cdn.jsdelivr.net; object-src 'none'; media-src 'self'; frame-src 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>Market News Dashboard - AIニュース分析</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="AIが主要ニュースサイトから収集・要約した最新の市場ニュース">
    <meta name="keywords" content="ニュース,市場,AI,要約,株式,経済">
    <meta name="author" content="Market News AI">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Market News Dashboard - AIニュース分析">
    <meta property="og:description" content="AIが分析した最新マーケットニュース">
    <meta property="og:type" content="website">
    
    <!-- CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.0.6/css/pico.min.css">
    <link rel="stylesheet" href="assets/css/custom.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1976d2">
    
    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    
    <!-- Header -->
    <header class="container main-header">
        <div class="header-content">
            <h1 class="header-title">
                📊 Market News Dashboard
            </h1>
            <div class="header-controls">
                <button id="theme-toggle" class="theme-toggle" aria-label="テーマ切り替え">🌙</button>
                <button id="refresh-button" class="refresh-button">🔄 更新</button>
                <a href="pro-summary.html" class="pro-summary-link">📈 詳細分析</a>
            </div>
        </div>
        <p>AIが主要ニュースサイトから収集・要約した最新情報</p>
    </header>
    
    <main class="container">
        
        <!-- 統計セクション -->
        <section class="stats-section">
            <div class="grid">
                <div class="stat-card">
                    <div class="stat-number" id="total-articles">-</div>
                    <div class="stat-label">総記事数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="last-updated">-</div>
                    <div class="stat-label">最終更新</div>
                </div>
                <div class="stat-card">
                    <canvas id="region-chart" width="200" height="150"></canvas>
                    <div class="stat-label">地域分布</div>
                </div>
                <div class="stat-card">
                    <canvas id="category-chart" width="200" height="150"></canvas>
                    <div class="stat-label">カテゴリ分布</div>
                </div>
            </div>
        </section>
        
        <!-- フィルター・検索 -->
        <section class="filter-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="search-input">🔍 記事を検索</label>
                    <input type="search" id="search-input" placeholder="キーワードで検索... (Ctrl+K)">
                </div>
                <div class="filter-group">
                    <label for="source-filter">📰 ソース</label>
                    <select id="source-filter">
                        <option value="">全てのソース</option>
                        <option value="Reuters">Reuters</option>
                        <option value="Bloomberg">Bloomberg</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="region-filter">🌍 地域</label>
                    <select id="region-filter">
                        <option value="">全ての地域</option>
                        <option value="japan">日本</option>
                        <option value="usa">アメリカ</option>
                        <option value="europe">欧州</option>
                        <option value="asia">アジア</option>
                        <option value="global">グローバル</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sort-filter">📊 並び順</label>
                    <select id="sort-filter">
                        <option value="date-desc">日時（新しい順）</option>
                        <option value="date-asc">日時（古い順）</option>
                        <option value="source">ソース順</option>
                    </select>
                </div>
            </div>
        </section>
        
        <!-- Loading Indicator -->
        <div id="loading" style="text-align: center; padding: 2rem; display: block;">
            <div style="font-size: 2rem;">⏳</div>
            <p>記事を読み込み中...</p>
        </div>
        
        <!-- 記事一覧 -->
        <section id="articles-section" style="display: none;">
            <h2>📰 記事一覧 <span id="articles-count"></span></h2>
            <div id="articles-container" class="articles-grid">
                <!-- 記事はJavaScriptで動的に生成 -->
            </div>
        </section>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>Market News Dashboard</h4>
                <p>AIによる市場ニュース分析</p>
            </div>
            <div class="footer-section">
                <h4>最終更新</h4>
                <p id="footer-last-updated">-</p>
            </div>
            <div class="footer-section">
                <h4>データソース</h4>
                <p>Reuters, Bloomberg</p>
            </div>
        </div>
        <hr>
        <div style="text-align: center;">
            <small>Powered by Gemini AI & Python Scrapers | 🤖 Generated with Claude Code</small>
        </div>
    </footer>
    
    <!-- JavaScript -->
    <script>
        // Safari 対応のための Polyfill
        if (!Array.prototype.includes) {
            Array.prototype.includes = function(searchElement /*, fromIndex*/) {
                'use strict';
                var O = Object(this);
                var len = parseInt(O.length) || 0;
                if (len === 0) {
                    return false;
                }
                var n = parseInt(arguments[1]) || 0;
                var k;
                if (n >= 0) {
                    k = n;
                } else {
                    k = len + n;
                    if (k < 0) {k = 0;}
                }
                for (; k < len; k++) {
                    if (searchElement === O[k]) {
                        return true;
                    }
                }
                return false;
            };
        }

        // グローバル変数
        let articlesData = [];
        let filteredArticles = [];
        
        // JSONファイルから記事データを読み込み
        async function loadArticlesData() {
            try {
                const response = await fetch('data/articles.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                // 記事データに地域・カテゴリー情報を追加
                articlesData = data.map(article => ({
                    title: article.title,
                    url: article.url,
                    summary: article.summary,
                    source: article.source,
                    published_jst: article.published_jst,
                    region: analyzeRegion(article.title, article.summary),
                    category: analyzeCategory(article.title, article.summary)
                }));
                
                console.log('記事データを読み込みました:', articlesData.length + '件');
                
                // データ読み込み完了後に初期化
                hideLoading();
                initializeApp();
                
            } catch (error) {
                console.error('記事データの読み込みに失敗しました:', error);
                hideLoading();
                showError('記事データの読み込みに失敗しました。');
            }
        }
        
        // ローディング非表示
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('articles-section').style.display = 'block';
        }
        
        // エラー表示
        function showError(message) {
            document.getElementById('articles-container').innerHTML = 
                `<div class="error-message" style="text-align: center; padding: 2rem; color: #e74c3c;">
                    <h3>⚠️ エラー</h3>
                    <p>${message}</p>
                </div>`;
        }
        
        // アプリケーション初期化
        function initializeApp() {
            updateStats();
            filteredArticles = [...articlesData];
            displayArticles();
            setupEventListeners();
        }
        
        // 統計情報を更新
        function updateStats() {
            const totalArticles = articlesData.length;
            document.getElementById('total-articles').textContent = totalArticles;
            document.getElementById('articles-count').textContent = `(${totalArticles}件)`;
            
            // 最終更新日時を計算
            if (articlesData.length > 0) {
                const latestDate = articlesData.reduce((latest, article) => {
                    const articleDate = new Date(article.published_jst);
                    return articleDate > latest ? articleDate : latest;
                }, new Date(articlesData[0].published_jst));
                
                const formattedDate = latestDate.toLocaleString('ja-JP', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                document.getElementById('last-updated').textContent = formattedDate;
                document.getElementById('footer-last-updated').textContent = formattedDate;
            }
            
            // チャートを作成
            createCharts();
        }
        
        // 地域を分析する関数
        function analyzeRegion(title, summary) {
            const content = ((title || '') + ' ' + (summary || '')).toLowerCase();
            
            if (content.includes('日本') || content.includes('japan') || content.includes('東京') || content.includes('円') || content.includes('日銀')) {
                return 'japan';
            }
            if (content.includes('米国') || content.includes('america') || content.includes('usa') || content.includes('ドル') || content.includes('fed') || content.includes('フェド') || content.includes('ny') || content.includes('ニューヨーク')) {
                return 'usa';
            }
            if (content.includes('欧州') || content.includes('europe') || content.includes('ユーロ') || content.includes('eu') || content.includes('ドイツ') || content.includes('フランス')) {
                return 'europe';
            }
            if (content.includes('中国') || content.includes('china') || content.includes('アジア') || content.includes('asia') || content.includes('韓国') || content.includes('インド')) {
                return 'asia';
            }
            return 'global';
        }
        
        // カテゴリを分析する関数
        function analyzeCategory(title, summary) {
            const content = ((title || '') + ' ' + (summary || '')).toLowerCase();
            
            if (content.includes('株') || content.includes('株式') || content.includes('株価') || content.includes('テスラ') || content.includes('ゴールドマン')) {
                return 'stock';
            }
            if (content.includes('債券') || content.includes('金利') || content.includes('利回り') || content.includes('fed') || content.includes('日銀')) {
                return 'bond';
            }
            if (content.includes('為替') || content.includes('ドル') || content.includes('円') || content.includes('ユーロ') || content.includes('外為')) {
                return 'forex';
            }
            if (content.includes('暗号') || content.includes('仮想通貨') || content.includes('ビットコイン') || content.includes('crypto')) {
                return 'crypto';
            }
            if (content.includes('商品') || content.includes('原油') || content.includes('金') || content.includes('commodity')) {
                return 'commodity';
            }
            return 'other';
        }
        
        // チャート作成
        function createCharts() {
            createChartsWithData(articlesData);
        }
        
        // 指定されたデータでチャートを作成
        function createChartsWithData(dataSet) {
            createRegionChart(dataSet);
            createCategoryChart(dataSet);
        }
        
        // 地域分布チャート
        function createRegionChart(dataSet) {
            const regionCounts = {};
            const regionLabels = {
                'japan': '日本',
                'usa': '米国',
                'europe': '欧州',
                'asia': 'アジア',
                'global': 'グローバル'
            };
            
            dataSet.forEach(article => {
                const region = analyzeRegion(article.title, article.summary);
                regionCounts[region] = (regionCounts[region] || 0) + 1;
            });
            
            const data = Object.entries(regionCounts).map(([key, value]) => ({
                label: regionLabels[key],
                count: value
            }));
            
            const ctx = document.getElementById('region-chart').getContext('2d');
            regionChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.map(d => d.label),
                    datasets: [{
                        data: data.map(d => d.count),
                        backgroundColor: [
                            '#FF6384',
                            '#36A2EB', 
                            '#FFCE56',
                            '#4BC0C0',
                            '#9966FF'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((sum, val) => sum + val, 0);
                                    const percentage = ((context.raw / total) * 100).toFixed(1);
                                    return context.label + ': ' + context.raw + '件 (' + percentage + '%)';
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // カテゴリ分布チャート
        function createCategoryChart(dataSet) {
            const categoryCounts = {};
            const categoryLabels = {
                'stock': '株式',
                'bond': '債券',
                'forex': '為替',
                'crypto': '暗号通貨',
                'commodity': '商品',
                'other': 'その他'
            };
            
            dataSet.forEach(article => {
                const category = analyzeCategory(article.title, article.summary);
                categoryCounts[category] = (categoryCounts[category] || 0) + 1;
            });
            
            const data = Object.entries(categoryCounts).map(([key, value]) => ({
                label: categoryLabels[key],
                count: value
            }));
            
            const ctx = document.getElementById('category-chart').getContext('2d');
            categoryChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: data.map(d => d.label),
                    datasets: [{
                        data: data.map(d => d.count),
                        backgroundColor: [
                            '#FF6384',
                            '#36A2EB',
                            '#FFCE56', 
                            '#4BC0C0',
                            '#9966FF',
                            '#FF9F40'
                        ],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((sum, val) => sum + val, 0);
                                    const percentage = ((context.raw / total) * 100).toFixed(1);
                                    return context.label + ': ' + context.raw + '件 (' + percentage + '%)';
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // 記事を表示
        function displayArticles() {
            const container = document.getElementById('articles-container');
            
            if (filteredArticles.length === 0) {
                container.innerHTML = '<div class="no-articles">該当する記事が見つかりませんでした。</div>';
                return;
            }
            
            const articlesHTML = filteredArticles.map(article => {
                const publishedDate = new Date(article.published_jst).toLocaleString('ja-JP', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                // 地域とカテゴリーのラベル
                const regionLabels = {
                    'japan': '🇯🇵 日本',
                    'usa': '🇺🇸 米国',
                    'europe': '🇪🇺 欧州',
                    'asia': '🌏 アジア',
                    'global': '🌍 グローバル'
                };
                
                const categoryLabels = {
                    'stock': '📈 株式',
                    'bond': '💰 債券',
                    'forex': '💱 為替',
                    'crypto': '₿ 暗号通貨',
                    'commodity': '🛢️ 商品',
                    'other': '📰 その他'
                };
                
                const regionLabel = regionLabels[article.region] || '🌐 その他';
                const categoryLabel = categoryLabels[article.category] || '📄 その他';
                
                return `
                    <article class="article-card">
                        <header class="article-header">
                            <h3 class="article-title">
                                <a href="${article.url}" target="_blank" rel="noopener noreferrer">
                                    ${article.title}
                                </a>
                            </h3>
                            <div class="article-meta">
                                <span class="article-source">📰 ${article.source}</span>
                                <span class="article-date">🕒 ${publishedDate}</span>
                                <span class="article-region">${regionLabel}</span>
                                <span class="article-category">${categoryLabel}</span>
                            </div>
                        </header>
                        <div class="article-content">
                            <p class="article-summary">${article.summary}</p>
                        </div>
                    </article>
                `;
            }).join('');
            
            container.innerHTML = articlesHTML;
            document.getElementById('articles-count').textContent = `(${filteredArticles.length}件)`;
        }
        
        // イベントリスナー設定
        function setupEventListeners() {
            // 検索機能
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', filterArticles);
            
            // フィルター機能
            const sourceFilter = document.getElementById('source-filter');
            const regionFilter = document.getElementById('region-filter');
            const sortFilter = document.getElementById('sort-filter');
            
            sourceFilter.addEventListener('change', filterArticles);
            regionFilter.addEventListener('change', filterArticles);
            sortFilter.addEventListener('change', filterArticles);
            
            // リフレッシュボタン
            const refreshButton = document.getElementById('refresh-button');
            refreshButton.addEventListener('click', () => {
                location.reload();
            });
            
            // テーマトグル
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('click', toggleTheme);
            
            // キーボードショートカット
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                }
            });
        }
        
        // チャート参照を保存するためのグローバル変数
        let regionChart = null;
        let categoryChart = null;
        
        // 記事フィルタリング
        function filterArticles() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const sourceFilter = document.getElementById('source-filter').value;
            const regionFilter = document.getElementById('region-filter').value;
            const sortFilter = document.getElementById('sort-filter').value;
            
            filteredArticles = articlesData.filter(article => {
                const matchesSearch = !searchTerm || 
                    article.title.toLowerCase().includes(searchTerm) || 
                    article.summary.toLowerCase().includes(searchTerm);
                
                const matchesSource = !sourceFilter || article.source === sourceFilter;
                
                const matchesRegion = !regionFilter || analyzeRegion(article.title, article.summary) === regionFilter;
                
                return matchesSearch && matchesSource && matchesRegion;
            });
            
            // ソート
            if (sortFilter === 'date-desc') {
                filteredArticles.sort((a, b) => new Date(b.published_jst) - new Date(a.published_jst));
            } else if (sortFilter === 'date-asc') {
                filteredArticles.sort((a, b) => new Date(a.published_jst) - new Date(b.published_jst));
            } else if (sortFilter === 'source') {
                filteredArticles.sort((a, b) => a.source.localeCompare(b.source));
            }
            
            displayArticles();
            updateChartsWithFilteredData();
        }
        
        // フィルターされたデータでチャート更新
        function updateChartsWithFilteredData() {
            if (regionChart) {
                regionChart.destroy();
            }
            if (categoryChart) {
                categoryChart.destroy();
            }
            createChartsWithData(filteredArticles);
        }
        
        // テーマ切り替え
        function toggleTheme() {
            const html = document.documentElement;
            const themeToggle = document.getElementById('theme-toggle');
            
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                themeToggle.textContent = '🌙';
            } else {
                html.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        }
        
        // ページ読み込み時にデータ読み込み開始
        document.addEventListener('DOMContentLoaded', loadArticlesData);
    </script>
    <script src="assets/js/app.js"></script>
</body>
</html>
